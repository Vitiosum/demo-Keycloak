<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Keycloak Demo — Clever Cloud</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0f1e 0%, #0d1530 50%, #0a0f1e 100%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px 16px 64px;
    }
    .container { max-width: 640px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 32px; }
    .header-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2);
      border-radius: 99px; color: #86efac; font-size: 13px; font-weight: 500;
      padding: 6px 16px; margin-bottom: 16px;
    }
    .dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse-dot 2s ease infinite; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .header h1 { font-size: 34px; font-weight: 700; color: white; margin-bottom: 8px; }
    .header h1 span { color: #22c55e; }
    .header p { color: #64748b; font-size: 14px; }

    .card {
      background: rgba(15,23,42,0.85); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 16px;
      padding: 22px; margin-bottom: 14px;
    }
    .card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #475569; margin-bottom: 14px; }

    .auth-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      border: none; border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 600; padding: 11px 20px; transition: all 0.2s;
    }
    .btn-login { background: #22c55e; color: #052e16; }
    .btn-login:hover { background: #16a34a; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(34,197,94,0.3); }
    .btn-logout { background: rgba(56,189,248,0.12); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.2); }
    .btn-logout:hover { background: rgba(56,189,248,0.2); transform: translateY(-1px); }

    .status-row { display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s; }
    .status-dot.loading { background: #f59e0b; animation: pulse-dot 1s ease infinite; }
    .status-dot.ok { background: #22c55e; }
    .status-dot.idle { background: #475569; }
    .status-dot.error { background: #ef4444; }
    .status-text { font-size: 15px; }

    .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .uf { background: rgba(2,6,23,0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 12px; }
    .uf-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #475569; margin-bottom: 4px; }
    .uf-value { font-size: 14px; color: #e2e8f0; word-break: break-all; }
    .uf-empty { color: #334155; font-style: italic; font-size: 13px; }

    .token-wrap { position: relative; }
    pre {
      background: rgba(2,6,23,0.8); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px; color: #7dd3fc; font-size: 12px; line-height: 1.6;
      overflow-x: auto; padding: 14px; white-space: pre-wrap; word-break: break-all;
    }
    pre.muted { color: #475569; font-style: italic; }
    .copy-btn {
      position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.07);
      border: none; border-radius: 6px; color: #64748b; cursor: pointer;
      font-size: 11px; padding: 4px 10px; transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.14); color: #e2e8f0; }

    @media (max-width: 480px) {
      .user-grid { grid-template-columns: 1fr; }
      .auth-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-badge">
        <span class="dot"></span>
        Clever Cloud · Keycloak Demo
      </div>
      <h1>Auth with <span>Keycloak</span></h1>
      <p>Single sign-on demo deployed on Clever Cloud</p>
    </div>

    <div class="card">
      <div class="card-title">Authentication</div>
      <div class="auth-actions">
        <button type="button" class="btn btn-login" onclick="doLogin()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
          Login
        </button>
        <button type="button" class="btn btn-logout" onclick="doLogout()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Logout
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Status</div>
      <div class="status-row">
        <div class="status-dot loading" id="status-dot"></div>
        <span class="status-text" id="status">Initialisation…</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">User</div>
      <div class="user-grid">
        <div class="uf"><div class="uf-label">Username</div><div class="uf-value uf-empty" id="uf-username">—</div></div>
        <div class="uf"><div class="uf-label">Email</div><div class="uf-value uf-empty" id="uf-email">—</div></div>
        <div class="uf"><div class="uf-label">Name</div><div class="uf-value uf-empty" id="uf-name">—</div></div>
        <div class="uf"><div class="uf-label">Issuer</div><div class="uf-value uf-empty" id="uf-issuer">—</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Access Token</div>
      <div class="token-wrap">
        <pre class="muted" id="token">No token</pre>
        <button class="copy-btn" onclick="copyToken()">Copy</button>
      </div>
    </div>

  </div>

  <script>
    console.log('INLINE SCRIPT LOADED');

    function setStatus(text, type) {
      document.getElementById('status').textContent = text;
      document.getElementById('status-dot').className = 'status-dot ' + type;
    }

    function setUF(id, value) {
      const el = document.getElementById(id);
      if (value) { el.textContent = value; el.classList.remove('uf-empty'); }
      else { el.textContent = '—'; el.classList.add('uf-empty'); }
    }

    function copyToken() {
      const t = document.getElementById('token').textContent;
      if (t && t !== 'No token') {
        navigator.clipboard.writeText(t).then(() => {
          const b = document.querySelector('.copy-btn');
          b.textContent = 'Copied!';
          setTimeout(() => b.textContent = 'Copy', 2000);
        });
      }
    }

    // Expose render hooks for app.js to use
    window.__setAuthenticated = function(keycloak) {
      setStatus('Authenticated', 'ok');
      const p = keycloak.tokenParsed || {};
      setUF('uf-username', p.preferred_username);
      setUF('uf-email', p.email);
      setUF('uf-name', p.name);
      setUF('uf-issuer', p.iss);
      const t = keycloak.token || '';
      const el = document.getElementById('token');
      el.textContent = t.length > 300 ? t.substring(0, 300) + '…' : (t || 'No token');
      el.classList.remove('muted');
    };

    window.__setUnauthenticated = function() {
      setStatus('Not authenticated', 'idle');
      setUF('uf-username', null); setUF('uf-email', null);
      setUF('uf-name', null); setUF('uf-issuer', null);
      const el = document.getElementById('token');
      el.textContent = 'No token'; el.classList.add('muted');
    };

    window.__setError = function(msg) {
      setStatus(msg, 'error');
    };
  </script>
  <script src="https://unpkg.com/keycloak-js@22.0.5/dist/keycloak.js"></script>
  <script src="./app.js"></script>
</body>
</html>
